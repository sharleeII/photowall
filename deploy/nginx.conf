server {
    listen 80;
    listen [::]:80;
    # Replace XX-XX-XX-XX with your Oracle VM IP (nip.io format)
    server_name XX-XX-XX-XX.nip.io;

    # Redirect HTTP to HTTPS (uncomment after certbot runs)
    # return 301 https://$host$request_uri;

    root /var/www/photowall/webroot;
    index index.php;

    # Serve static files directly (thumbs, originals, CSS, JS)
    location ~* \.(jpg|jpeg|png|gif|webp|ico|css|js|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Everything else → CakePHP front controller
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 60;
        client_max_body_size 20M;
    }

    # Block access to config and sensitive dirs
    location ~* ^/(config|src|vendor|tests|tmp)/ {
        deny all;
    }

    access_log /var/log/nginx/photowall_access.log;
    error_log  /var/log/nginx/photowall_error.log;
}

